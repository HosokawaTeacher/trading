  <style>
    :root {
      color-scheme: light;
      --bg: #f7f8fb;
      --panel: #ffffff;
      --ink: #1f2937;
      --muted: #667085;
      --line: #d9dee8;
      --accent: #0f766e;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
    }

    header {
      padding: 20px 24px 12px;
      border-bottom: 1px solid var(--line);
      background: #fff;
    }

    h1 {
      margin: 0 0 6px;
      font-size: 22px;
      letter-spacing: 0;
    }

    .sub {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
    }

    main {
      padding: 18px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(420px, 1fr));
      gap: 16px;
    }

    .chart {
      min-height: 440px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
    }

    .chart-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      background: #fbfcfe;
    }

    .name {
      font-weight: 700;
      font-size: 14px;
    }

    .model {
      color: var(--accent);
      font-weight: 700;
      font-size: 12px;
      white-space: nowrap;
    }

    .tradingview-widget-container {
      height: 390px;
    }

    .tradingview-widget-container__widget {
      height: 100%;
    }

    @media (max-width: 520px) {
      main {
        padding: 10px;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .chart {
        min-height: 390px;
      }

      .tradingview-widget-container {
        height: 340px;
      }
    }
  </style>
</head>
